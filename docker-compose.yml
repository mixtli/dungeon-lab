services:
  # Caddy reverse proxy
  caddy:
    image: caddy:2-alpine
    profiles: ["app", "all"]
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile
      - caddy_data:/data
      - caddy_config:/config
    environment:
      - SITE_ADDRESS=${SITE_ADDRESS:-:80}
    depends_on:
      - server
      - web
    restart: unless-stopped

  # Backend Express server
  server:
    profiles: ["app", "all"]
    build:
      context: .
      dockerfile: packages/server/Dockerfile
    expose:
      - "3000"
    environment:
      - NODE_ENV=${NODE_ENV:-development}
      - MONGODB_URI=mongodb://mongo:27017/dungeon-lab?directConnection=true
      - SESSION_SECRET=${SESSION_SECRET:-your_session_secret_here}
      - MINIO_ENDPOINT=minio
      - MINIO_PORT=9000
      - MINIO_ACCESS_KEY=minioadmin
      - MINIO_SECRET_KEY=minioadmin
      - MINIO_BUCKET=dungeon-lab
      - CLIENT_URL=${CLIENT_URL:-http://localhost}
      - GOOGLE_CALLBACK_URL=${GOOGLE_CALLBACK_URL:-http://localhost/api/auth/google/callback}
      - GOOGLE_CLIENT_ID
      - GOOGLE_CLIENT_SECRET
      - PREFECT_API_URL=http://prefect-server:4200/api
    depends_on:
      mongo:
        condition: service_healthy
      minio:
        condition: service_started
    restart: unless-stopped

  # Frontend Vue.js app
  web:
    profiles: ["app", "all"]
    build:
      context: .
      dockerfile: packages/web/Dockerfile
    expose:
      - "8080"
    depends_on:
      - server
    restart: unless-stopped

  # MongoDB database
  mongo:
    image: mongo:latest
    profiles: ["infra", "all"]
    ports:
      - "27017:27017"
    volumes:
      - ./mongo_data:/data/db
    command: ["mongod", "--replSet", "rs0", "--bind_ip_all", "--port", "27017"]
    healthcheck:
      test: |
        echo "try { rs.status() } catch (err) { rs.initiate({_id:'rs0',members:[{_id:0,host:'mongo:27017'}]}) }" | mongosh --port 27017 --quiet
      interval: 5s
      timeout: 30s
      retries: 30
    restart: unless-stopped

  # MinIO object storage
  minio:
    image: minio/minio:latest
    profiles: ["infra", "all"]
    ports:
      - "0.0.0.0:9000:9000"  # API port - bind to all interfaces
      - "0.0.0.0:9001:9001"  # Console port - bind to all interfaces
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
      MINIO_BROWSER_REDIRECT_URL: http://localhost:9001
    volumes:
      - ./minio_data:/data
    command: server --console-address ":9001" /data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 30s
      timeout: 20s
      retries: 3
    restart: unless-stopped

  # Prefect workflow server
  prefect-server:
    image: prefecthq/prefect:3-python3.11
    profiles: ["app", "all"]
    command: prefect server start --host 0.0.0.0
    ports:
      - "4200:4200"
    volumes:
      - prefect_data:/root/.prefect
    environment:
      - PREFECT_UI_API_URL=http://localhost:4200/api
      - PREFECT_API_URL=http://0.0.0.0:4200/api
    healthcheck:
      test: ["CMD", "python", "-c", "import httpx; httpx.get('http://localhost:4200/api/health')"]
      interval: 10s
      timeout: 5s
      retries: 30
    restart: unless-stopped

  # Prefect flow deployment registration (one-shot)
  prefect-register:
    profiles: ["app", "all"]
    build:
      context: .
      dockerfile: ai-workflows/Dockerfile
    command: python -m src.flows.register
    depends_on:
      prefect-server:
        condition: service_healthy
    environment:
      - PREFECT_API_URL=http://prefect-server:4200/api
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
      - CALLBACK_BASE_URL=http://server:3000/api
      - CALLBACK_AUTH_TOKEN=${CALLBACK_AUTH_TOKEN:-}
      - MINIO_ENDPOINT=minio
      - MINIO_PORT=9000
      - MINIO_ACCESS_KEY=minioadmin
      - MINIO_SECRET_KEY=minioadmin
      - MINIO_BUCKET_NAME=prefect
    restart: "no"

  # Prefect worker for executing flows
  prefect-worker:
    profiles: ["app", "all"]
    build:
      context: .
      dockerfile: ai-workflows/Dockerfile
    command: prefect worker start --pool process-pool
    depends_on:
      prefect-server:
        condition: service_healthy
      minio:
        condition: service_started
    environment:
      - PREFECT_API_URL=http://prefect-server:4200/api
      - PYTHONPATH=/app
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
      - CALLBACK_BASE_URL=http://server:3000/api
      - CALLBACK_AUTH_TOKEN=${CALLBACK_AUTH_TOKEN:-}
      - MINIO_ENDPOINT=minio
      - MINIO_PORT=9000
      - MINIO_USE_SSL=false
      - MINIO_ACCESS_KEY=minioadmin
      - MINIO_SECRET_KEY=minioadmin
      - MINIO_BUCKET_NAME=prefect
      - MINIO_PUBLIC_URL=http://minio:9000
    restart: unless-stopped

  # Service to create the bucket and set policies
  createbuckets:
    image: minio/mc
    profiles: ["infra", "all"]
    depends_on:
      - minio
    entrypoint: >
      /bin/sh -c "
      sleep 5;
      /usr/bin/mc config host add myminio http://minio:9000 minioadmin minioadmin;
      /usr/bin/mc mb myminio/dungeon-lab --ignore-existing;
      /usr/bin/mc mb myminio/prefect --ignore-existing;
      /usr/bin/mc anonymous set download myminio/dungeon-lab;
      /usr/bin/mc anonymous set download myminio/prefect;
      exit 0;
      "

volumes:
  mongo_data:
  minio_data:
  caddy_data:
  caddy_config:
  prefect_data: